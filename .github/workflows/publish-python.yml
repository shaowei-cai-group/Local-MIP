name: Publish Python Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: python -m pip install --upgrade build setuptools wheel pybind11
      - name: Build sdist
        run: python -m build --sdist python-bindings --outdir dist
      - uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/*.tar.gz

  build_wheels:
    name: Build Linux wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: "cp38-manylinux_x86_64 cp39-manylinux_x86_64 cp310-manylinux_x86_64 cp311-manylinux_x86_64 cp312-manylinux_x86_64"
          CIBW_ARCHS_LINUX: x86_64
          CIBW_BUILD_FRONTEND: "pip; args: --no-build-isolation"
          CIBW_BUILD_VERBOSITY: 1
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y cmake
          CIBW_BEFORE_BUILD: >
            python -m pip install --upgrade setuptools wheel pybind11
          CIBW_TEST_COMMAND: >
            python {project}/python-bindings/smoke_test.py
        with:
          package-dir: python-bindings
          output-dir: dist
      - uses: actions/upload-artifact@v4
        with:
          name: python-wheels
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    needs:
      - build_sdist
      - build_wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/localmip
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
